<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phaser 渲染测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #game-container { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="importmap">
    { "imports": { "phaser": "/node_modules/phaser/dist/phaser.esm.js" } }
  </script>
  <script type="module">
    import Phaser from 'phaser';

    console.log('Phaser 版本:', Phaser.VERSION);

    class TestScene extends Phaser.Scene {
      constructor() { super('test'); }
      create() {
        console.log('TestScene create()');
        this.cameras.main.setBackgroundColor('#ff0000'); // 红色背景，明显可见

        this.add.text(195, 422, 'Phaser 渲染成功!', {
          fontSize: '28px',
          fontFamily: 'sans-serif',
          color: '#ffffff',
          fontStyle: 'bold',
        }).setOrigin(0.5);

        this.add.text(195, 470, '如果你看到这行字，说明引擎正常', {
          fontSize: '14px',
          fontFamily: 'sans-serif',
          color: '#ffff00',
        }).setOrigin(0.5);

        // 画个绿色圈
        this.add.circle(195, 350, 60, 0x00ff00);

        console.log('TestScene 渲染完成');
      }
    }

    try {
      const game = new Phaser.Game({
        type: Phaser.AUTO,
        parent: 'game-container',
        width: 390,
        height: 844,
        backgroundColor: '#ff0000',
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [TestScene],
      });
      console.log('Phaser.Game 创建成功, 渲染器:', game.renderer.type === 1 ? 'WebGL' : 'Canvas');
    } catch (e) {
      console.error('创建失败:', e);
      document.getElementById('game-container').innerHTML =
        '<h1 style="color:red;padding:20px;">Phaser 启动失败: ' + e.message + '</h1>';
    }
  </script>
</body>
</html>
